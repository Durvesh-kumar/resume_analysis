version: "3.9"

services:
  # ---------- 🧠 Backend ----------
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always

    ports:
      - "5000:5000"

    environment:
      - NODE_ENV=production

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- 🌐 Frontend ----------
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------- 🚀 Nginx Reverse Proxy ----------
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ---------- 🤖 AI Monitoring (optional future) ----------
  # You can add monitoring tools here (Prometheus, Grafana)

networks:
  default:
    name: ai-monorepo-network

# Run Production
# docker-compose -f docker-compose.production.yaml up -d --build

# Stop
# docker-compose -f docker-compose.production.yaml down