services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    networks:
      - app-network          # ✅ add this

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network          # ✅ add this

networks:
  app-network:               # ✅ add this block
    driver: bridge